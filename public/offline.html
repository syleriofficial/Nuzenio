<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <title>Offline | Nuzenio</title>
  <style>
    body{margin:0;background:#f8fafc;color:#111827;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:24px}
    section{max-width:560px;border:1px solid #dbe5f2;border-radius:8px;background:#fff;padding:28px;box-shadow:0 18px 48px rgba(15,23,42,.08)}
    img{width:154px;height:auto;margin-bottom:18px}
    h1{margin:0 0 10px;font-size:32px;line-height:1.1}
    p{margin:0 0 18px;color:#475569;font-weight:750;line-height:1.55}
    a{display:inline-flex;border-radius:8px;background:#2563eb;color:#fff;padding:11px 14px;font-weight:900;text-decoration:none}
  </style>
</head>
<body>
  <main>
    <section>
      <img src="/logo.svg" alt="Nuzenio">
      <h1>You are offline</h1>
      <p>Nuzenio cached the app shell, but live news needs a connection. Reopen when internet is back and the latest headlines will refresh.</p>
      <a href="/">Try again</a>
    </section>
  </main>
</body>
</html>
