[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), payment=()"
    X-Frame-Options = "SAMEORIGIN"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/offline.html"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/humans.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/.well-known/security.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-languages.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/news-sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=300, stale-while-revalidate=300"

[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=utf-8"
    Cache-Control = "public, max-age=300, stale-while-revalidate=300"

[[headers]]
  for = "/opensearch.xml"
  [headers.values]
    Content-Type = "application/opensearchdescription+xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icon.svg"
  [headers.values]
    Content-Type = "image/svg+xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/logo.svg"
  [headers.values]
    Content-Type = "image/svg+xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/og-image.svg"
  [headers.values]
    Content-Type = "image/svg+xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/api/news"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=240"

[[headers]]
  for = "/api/location"
  [headers.values]
    Cache-Control = "public, max-age=900"

[[headers]]
  for = "/api/health"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/api/ecosystem"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/api/v1/*"
  [headers.values]
    Cache-Control = "public, max-age=120, stale-while-revalidate=300"
    X-RateLimit-Policy = "api-key-quota-or-edge-default"

[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

[[redirects]]
  from = "/api/location"
  to = "/.netlify/functions/location"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/ecosystem"
  to = "/.netlify/functions/ecosystem"
  status = 200

[[redirects]]
  from = "/api/admin-rss-test"
  to = "/.netlify/functions/admin-rss-test"
  status = 200

[[redirects]]
  from = "/api/newsletter"
  to = "/.netlify/functions/newsletter"
  status = 200

[[redirects]]
  from = "/api/newsletter-digest"
  to = "/.netlify/functions/newsletter-digest"
  status = 200

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/v1"
  status = 200

[[redirects]]
  from = "/api/v1"
  to = "/.netlify/functions/v1"
  status = 200

[[redirects]]
  from = "/feed.xml"
  to = "/.netlify/functions/feed"
  status = 200

[[redirects]]
  from = "/news-sitemap.xml"
  to = "/.netlify/functions/news-sitemap"
  status = 200

[[redirects]]
  from = "/article/*"
  to = "/.netlify/functions/article"
  status = 200

[[redirects]]
  from = "/:lang/article/*"
  to = "/.netlify/functions/article"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
