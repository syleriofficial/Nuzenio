  <script type="application/ld+json" id="nuzenio-initial-jsonld">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://nuzenio.com/#organization",
          "name": "Nuzenio",
          "alternateName": ["Nuzenio News", "Nuzenio.com"],
          "url": "https://nuzenio.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://nuzenio.com/icon.svg",
            "width": 512,

          "@type": "WebSite",
          "@id": "https://nuzenio.com/#website",
          "name": "Nuzenio",

          }
        },

          "@type": "WebApplication",
