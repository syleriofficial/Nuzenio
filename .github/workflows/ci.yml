name: Nuzenio CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check functions
        run: |
          node --check netlify/functions/news.js
          node --check netlify/functions/v1.js
          node --check netlify/functions/article.js
          node --check netlify/functions/health.js
          node --check scripts/check-supabase.mjs
          node --check scripts/generate-sitemap.mjs

      - name: Build
        run: npm run build
